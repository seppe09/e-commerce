{% extends "base.html" %}
{% load static %}

{% block title %}Update Password - Store{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{% static 'css/auth.css' %}">
{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card" style="max-width: 500px;">
        <div class="auth-header">
            <h2 class="auth-title">Update Password</h2>
            <p class="auth-subtitle">Change your account password securely.</p>
        </div>

        <form method="post" action="{% url 'update_password_view' %}" novalidate>
            {% csrf_token %}

            <!-- Old Password -->
            <div class="form-group">
                <label for="id_old_password" class="form-label">Current Password</label>
                <input type="password" name="old_password" id="id_old_password" 
                       class="input-control" placeholder="Enter current password" required>
            </div>

            <!-- New Password -->
            <div class="form-group">
                <label for="id_new_password" class="form-label">New Password</label>
                <input type="password" name="new_password" id="id_new_password" 
                       class="input-control" placeholder="Enter new password" required>
            </div>

            <!-- Confirm Password -->
            <div class="form-group">
                <label for="id_confirm_password" class="form-label">Confirm New Password</label>
                <input type="password" name="confirm_password" id="id_confirm_password" 
                       class="input-control" placeholder="Confirm new password" required>
            </div>

            <!-- Action buttons -->
            <div style="display: flex; flex-direction: column; gap: 12px; margin-top: 28px;">
                <button type="submit" class="btn btn-primary auth-submit-btn" style="margin-top: 0; height: 46px;">
                    Update Password
                </button>
                <a href="{% url 'dashboard_view' %}" class="btn btn-secondary" style="text-align: center; display: inline-flex; align-items: center; justify-content: center; height: 46px;">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
